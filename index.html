<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>れ・さーち - れいわ新選組 街宣・おしゃべり会 検索ツール（非公式）</title>

</head>
<body>
  <div class="container">
    <h1 class="site-title">
      れ・さーち

        <path d="M226.5 92.9c14.3 73.1-.1 142.1-32.2 154.2-32.2 12.1-68.5-37.3-82.8-110.4-14.3-73.1 .1-142.1 32.2-154.2 32.2-12.1 68.5 37.3 82.8 110.4zM102.4 246.3c-22.3 54.3-71 83.1-108.9 64.3-37.9-18.8-50.5-78.1-28.2-132.4 22.3-54.3 71-83.1 108.9-64.3 37.9 18.8 50.5 78.1 28.2 132.4zm285.5-153.4c-14.3-73.1-50.5-122.5-82.8-110.4-32.2 12.1-46.5 81.1-32.2 154.2 14.3 73.1 50.5 122.5 82.8 110.4 32.2-12.1 46.5-81.1 32.2-154.2zM473.4 399.1c-43.1 61.1-118 97.4-217.4 97.4-99.4 0-174.3-36.3-217.4-97.4-40.2-57-36.3-118.4 10.9-158.6 30-25.5 72.8-37.5 119.3-33.8 28.4 2.3 55.4 10.1 76.9 22.7 3.3 1.9 8.1 3.2 10.2 3.2 2.2 0 7-1.3 10.2-3.2 21.5-12.6 48.5-20.4 76.9-22.7 46.5-3.7 89.3 8.3 119.3 33.8 47.3 40.2 51.1 101.6 10.9 158.6zm-63.8-152.8c-37.9-18.8-86.6 10-108.9 64.3-22.3 54.3-9.7 113.6 28.2 132.4 37.9 18.8 86.6-10 108.9-64.3 22.3-54.3 9.7-113.6-28.2-132.4z"/>
      </svg>
    </h1>
    
    <div class="site-description-wrapper">
      <div class="site-description">
        <p>
           れいわ新選組の街宣・おしゃべり会の中からキーワードで検索し、該当する動画部分を探し出す非公式ツールです。
        </p>
        <ul class="description-points">
          <li>• AND検索も可能です（例：「2025　北海道　消費税」）</li>
          <li>• AIによる自動要約のため不正確な場合があります</li>
        </ul>
      </div>
    </div>

    <div class="search-area">
      <input type="text" id="searchInput" placeholder="例：ガソリン 減税 （スペースで区切って複数検索）">
      <button id="searchButton">
        <svg viewBox="0 0 512 512" width="16" height="16" fill="white"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/></svg>
        検索
      </button>
    </div>

    <div id="resultsArea"></div>
  </div>

  <div id="floatingPlayer" class="floating-player" style="display: none;">
    <div id="playerHeader" class="player-header">
      <span class="drag-handle">≡ つまんで移動</span>
      <button id="closePlayer">
        <svg viewBox="0 0 320 512" width="14" height="14" fill="#e4007e"><path d="M310.6 150.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L160 210.7 54.6 105.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L114.7 256 9.4 361.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 301.3 265.4 406.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L205.3 256 310.6 150.6z"/></svg>
      </button>
    </div>
    <div class="iframe-container">
      <iframe id="youtubeIframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
